<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <script>
        sessionStorage.setItem('currentUser', 'JohnDoes');

        const user = sessionStorage.getItem('currentUser');

        sessionStorage.removeItem('currentUser');
        sessionStorage.clear();
    </script>
